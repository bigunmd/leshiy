name: ✨ Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion! Please search existing issues first to avoid duplicates.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've thought about.
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which area does this mainly affect?
      options:
        - CLI client
        - CLI server
        - Desktop app (GUI)
        - Android app
        - Protocol / transports
        - Other / not sure
    validations:
      required: false
