name: release
on:
  push:
    tags: ["v*"]
# Least privilege by default; each job widens only what it needs.
permissions:
  contents: read

jobs:
  binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add ${{ matrix.target }}
      - run: sudo apt-get update && sudo apt-get install -y nasm cmake
      - run: pip install ziglang && cargo install --locked cargo-zigbuild
      - run: cargo zigbuild --release --target ${{ matrix.target }} -p leshiy
      - name: Package
        run: |
          V="${GITHUB_REF_NAME}"
          T="${{ matrix.target }}"
          install -Dm755 "target/$T/release/leshiy" "dist/leshiy"
          tar -C dist -czf "leshiy-$V-$T.tar.gz" leshiy
          rm dist/leshiy
      - uses: actions/upload-artifact@v4
        with:
          name: tar-${{ matrix.target }}
          path: leshiy-*.tar.gz

  release:
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { pattern: "tar-*", merge-multiple: true }
      - name: Checksums
        run: sha256sum leshiy-*.tar.gz > SHA256SUMS
      - name: Install minisign
        run: sudo apt-get update && sudo apt-get install -y minisign
      - name: Sign checksums (minisign)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          trap 'rm -f minisign.key' EXIT   # never leave the secret key around
          echo "$MINISIGN_PASSWORD" | minisign -S -s minisign.key -m SHA256SUMS
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          # This (server/CLI) train owns GitHub's shared "latest" pointer, so that
          # releases/latest/download/{install,install-client}.sh + leshiyctl always resolve here.
          # desktop-v*/android-v* releases set make_latest:false to stay off it.
          make_latest: true
          files: |
            leshiy-*.tar.gz
            SHA256SUMS
            SHA256SUMS.minisig
            scripts/install.sh
            scripts/install-client.sh
            scripts/leshiyctl
            scripts/minisign.pub

  image:
    runs-on: ubuntu-latest
    permissions:
      packages: write   # push to GHCR
      id-token: write   # cosign keyless (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
      - name: Sign image (cosign keyless)
        run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
