name: desktop-ci
on:
  push:
    paths: ["apps/gui/**", "crates/leshiy-client/**", ".github/workflows/desktop-ci.yml"]
  pull_request:
    paths: ["apps/gui/**", "crates/leshiy-client/**", ".github/workflows/desktop-ci.yml"]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: apps/gui
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt, clippy }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/gui/pnpm-lock.yaml
      - name: Install Linux webview deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Build leshiy-helper sidecar
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          # bundle.externalBin requires binaries/leshiy-helper-<triple> to exist for ANY
          # tauri build/check (clippy + `tauri build` below both run the build script).
          cargo build -p leshiy-helper
          triple=$(rustc -vV | sed -n 's/^host: //p')
          ext=""; [[ "$triple" == *windows* ]] && ext=".exe"
          mkdir -p apps/gui/src-tauri/binaries
          cp "target/debug/leshiy-helper$ext" "apps/gui/src-tauri/binaries/leshiy-helper-$triple$ext"
      - name: Rust gates (src-tauri)
        working-directory: apps/gui/src-tauri
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
      - run: pnpm tauri build --no-bundle
