name: desktop-ci
on:
  push:
    paths: ["apps/desktop/**", "crates/leshiy-client/**", ".github/workflows/desktop-ci.yml"]
  pull_request:
    paths: ["apps/desktop/**", "crates/leshiy-client/**", ".github/workflows/desktop-ci.yml"]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt, clippy }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml
      - name: Install Linux webview deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Rust gates (src-tauri)
        working-directory: apps/desktop/src-tauri
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
      - run: pnpm tauri build --no-bundle
