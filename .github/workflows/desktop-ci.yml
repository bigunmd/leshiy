name: desktop-ci
on:
  # branches (and NOT tags): GitHub ignores `paths` filters on tag pushes, so without this every
  # release tag (including v* and android-v*) re-ran this whole workflow on an unchanged tree.
  # Listing `branches` is what excludes tags — a lone `tags-ignore` would disable branch pushes.
  push:
    branches: ["**"]
    paths: ["apps/gui/**", "crates/leshiy-client/**", ".github/workflows/desktop-ci.yml"]
  pull_request:
    paths: ["apps/gui/**", "crates/leshiy-client/**", ".github/workflows/desktop-ci.yml"]
permissions:
  contents: read

# One run per ref: a follow-up push cancels the run it superseded.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: apps/gui
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt, clippy }
      # src-tauri is its own workspace (own Cargo.lock), separate from the root one that
      # leshiy-helper builds from — both need caching or this job rebuilds everything each run.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/gui/src-tauri -> target
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/gui/pnpm-lock.yaml
      - name: Install Linux webview deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Build leshiy-helper sidecar
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          # bundle.externalBin requires binaries/leshiy-helper-<triple> to exist for ANY
          # tauri build/check (clippy + `tauri build` below both run the build script).
          cargo build -p leshiy-helper
          triple=$(rustc -vV | sed -n 's/^host: //p')
          ext=""; [[ "$triple" == *windows* ]] && ext=".exe"
          mkdir -p apps/gui/src-tauri/binaries
          cp "target/debug/leshiy-helper$ext" "apps/gui/src-tauri/binaries/leshiy-helper-$triple$ext"
      - name: Rust gates (src-tauri)
        working-directory: apps/gui/src-tauri
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
      - run: pnpm tauri build --no-bundle
