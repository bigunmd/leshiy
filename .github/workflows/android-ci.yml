name: android-ci
on:
  # branches (and NOT tags): GitHub ignores `paths` filters on tag pushes, so without this every
  # release tag (including v* and desktop-v*) re-ran this whole workflow on an unchanged tree.
  # Listing `branches` is what excludes tags — a lone `tags-ignore` would disable branch pushes.
  push:
    branches: ["**"]
    paths:
      - "apps/android/**"
      - "crates/**"
      - "scripts/build-android-jni.sh"
      - ".github/workflows/android-ci.yml"
  pull_request:
    paths:
      - "apps/android/**"
      - "crates/**"
      - "scripts/build-android-jni.sh"
      - ".github/workflows/android-ci.yml"
permissions:
  contents: read

# One run per ref: a follow-up push cancels the run it superseded.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Native Kotlin/Compose app: cross-compile the leshiy-mobile bridge, generate the Kotlin
  # bindings, run the Kotlin unit tests, and assemble the debug APK. (The Rust side of
  # leshiy-mobile — clippy/fmt/tests — is covered by the main `ci` workflow's `cargo test --all`.)
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # rust-cache restores ~/.cargo/bin, so this is a no-op on a cache hit — only a cold cache
      # pays the ~2min source build.
      - name: Install cargo-ndk
        run: command -v cargo-ndk >/dev/null || cargo install cargo-ndk --locked

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Caches the Gradle distribution + dependency jars across runs (AGP/Compose pull ~hundreds of
      # MB otherwise, on every run).
      - uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: apps/android

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true

      # Cross-compile the bridge for all 3 ABIs + generate Kotlin bindings. This also
      # compile-gates leshiy-client / leshiy-tun for Android (the bridge pulls them in).
      - name: Build native bridge (.so + Kotlin bindings)
        run: |
          export ANDROID_NDK_HOME="$ANDROID_NDK_LATEST_HOME"
          ./scripts/build-android-jni.sh

      # Kotlin unit tests + debug APK. AGP downloads any missing SDK platform/build-tools.
      - name: Gradle test + assemble
        working-directory: apps/android
        run: ./gradlew --no-daemon testDebugUnitTest assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: leshiy-android-debug-apk
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
