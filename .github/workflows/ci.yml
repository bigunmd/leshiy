name: ci
on:
  # branches (and NOT tags): a release round pushes v*, android-v* and desktop-v* at the same
  # tree, and each tag push would otherwise re-run this workflow on code master already tested.
  # Tag pushes are the release workflows' job.
  #
  # `branches: ["**"]` is what excludes tags, and it must be spelled this way round: GitHub skips
  # a workflow for whichever ref type the filters leave undefined, so a lone `tags-ignore` would
  # disable branch pushes instead — silently turning CI off.
  push:
    branches: ["**"]
  pull_request:

# One run per ref: a follow-up push cancels the run it superseded.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Safety net: a deadlocked test (e.g. a transport stall) must fail the run, not hang
    # for GitHub's 6-hour default. Generous enough for a cold build + full test suite.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt, clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      # The ICMP echo tests (ADR-0030) need unprivileged ping sockets. The kernel default for
      # ping_group_range is `1 0` — an empty range — so without this they skip silently, and a
      # test that always skips reads as coverage while providing none. This is the same setting
      # the server container gets; it affects only the runner.
      - name: Allow unprivileged ICMP sockets (for the ADR-0030 echo tests)
        run: sudo sysctl -w 'net.ipv4.ping_group_range=0 2147483647'
      - run: cargo test --all

  # Shell unit tests (no network): the release-pointer invariant lives in pure sh logic,
  # so guard it on every push/PR alongside the Rust suite.
  scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: sh scripts/test/check_latest_pointer_test.sh

  # Supply-chain / advisory gate (L7): RustSec advisories, no git/unknown
  # sources. Config in deny.toml.
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources
