name: android-release
on:
  push:
    tags: ["android-v*"]
permissions:
  contents: write
jobs:
  apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # Release signing is opt-in: set ANDROID_KEYSTORE_B64 (base64 of the .jks) + the password/alias
    # secrets to produce a signed APK. Absent (e.g. forks) → an unsigned APK (still installable for
    # testing, but not updatable). Secrets are read via env (never interpolated into run scripts).
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true

      - name: Decode release keystore
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -n "$KS" ]; then
            echo "$KS" | base64 -d > "$RUNNER_TEMP/release.jks"
            # app/build.gradle.kts reads this to enable the release signingConfig.
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          else
            echo "No ANDROID_KEYSTORE_B64 secret — building an UNSIGNED release APK."
          fi

      # Cross-compile the leshiy-mobile bridge for all 3 ABIs + generate the Kotlin bindings,
      # staged into apps/android/app/src/main/jniLibs (same as android-ci.yml).
      - name: Build native bridge (.so + Kotlin bindings)
        run: |
          export ANDROID_NDK_HOME="$ANDROID_NDK_LATEST_HOME"
          ./scripts/build-android-jni.sh

      # Assemble the release APK. versionName/versionCode derive from the workspace Cargo.toml.
      - name: Assemble release APK
        working-directory: apps/android
        run: ./gradlew --no-daemon assembleRelease

      - name: Collect APK(s) + checksums
        run: |
          mkdir -p dist
          # Signed → app-release.apk; unsigned (no keystore) → app-release-unsigned.apk.
          find apps/android/app/build/outputs/apk/release -name "*.apk" -exec cp {} dist/ \;
          ( cd dist && sha256sum *.apk > SHA256SUMS )
          ls -la dist

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          # Stay off GitHub's shared "latest" pointer — it must remain on the v* server/CLI train
          # (the only one shipping install.sh/install-client.sh/leshiyctl), else the README's
          # releases/latest install URLs 404 once an Android release is published.
          make_latest: false
          name: Leshiy Android ${{ github.ref_name }}
          body: "Native Android APK for ${{ github.ref_name }} (universal). Kotlin/Compose app."
          files: |
            dist/*.apk
            dist/SHA256SUMS
