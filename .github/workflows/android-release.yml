name: android-release
on:
  push:
    tags: ["android-v*"]
permissions:
  contents: write
jobs:
  apk:
    runs-on: ubuntu-22.04
    # Release signing is opt-in: set ANDROID_KEYSTORE_B64 (base64 of the .jks) + the password/alias
    # secrets to produce a signed APK. Absent (e.g. forks) → an unsigned APK (still installable for
    # testing, but not updatable). Secrets are read via env (never interpolated into run scripts).
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml
      - name: Install JS deps
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile
      - name: Decode release keystore
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -n "$KS" ]; then
            echo "$KS" | base64 -d > "$RUNNER_TEMP/release.jks"
            # build.gradle.kts reads this to enable the release signingConfig.
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          else
            echo "No ANDROID_KEYSTORE_B64 secret — building an UNSIGNED release APK."
          fi
      - name: Build APK(s)
        working-directory: apps/desktop
        run: |
          export ANDROID_NDK_HOME="$ANDROID_NDK_LATEST_HOME"
          export NDK_HOME="$ANDROID_NDK_LATEST_HOME"
          pnpm tauri android build --apk --target aarch64 --target armv7 --target x86_64
      - name: Collect APKs + checksums
        run: |
          mkdir -p dist
          find apps/desktop/src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -exec cp {} dist/ \;
          ( cd dist && sha256sum *.apk > SHA256SUMS )
          ls -la dist
      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Leshiy Android ${{ github.ref_name }}
          body: "Android APKs for ${{ github.ref_name }}. arm64-v8a / armeabi-v7a / x86_64."
          files: |
            dist/*.apk
            dist/SHA256SUMS
