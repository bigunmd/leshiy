name: desktop-release
on:
  push:
    tags: ["desktop-v*"]
permissions:
  contents: write
jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest
          - platform: macos-latest
    runs-on: ${{ matrix.platform }}
    # Windows Authenticode signing is opt-in: set the WINDOWS_CERTIFICATE (base64 .pfx) and
    # WINDOWS_CERTIFICATE_PASSWORD secrets to enable it. Absent → unsigned build (forks/PRs).
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/gui/pnpm-lock.yaml
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libappindicator3-dev patchelf
      - name: Install JS deps
        working-directory: apps/gui
        run: pnpm install --frozen-lockfile
      - name: Build leshiy-helper sidecar
        shell: bash
        run: |
          # The GUI launches this elevated on demand (macOS/Windows). Tauri bundles it via
          # bundle.externalBin, expecting binaries/leshiy-helper-<target-triple>[.exe].
          cargo build -p leshiy-helper --release
          triple=$(rustc -vV | sed -n 's/^host: //p')
          ext=""; [[ "$triple" == *windows* ]] && ext=".exe"
          mkdir -p apps/gui/src-tauri/binaries
          cp "target/release/leshiy-helper$ext" "apps/gui/src-tauri/binaries/leshiy-helper-$triple$ext"
      - name: Import Windows code-signing certificate
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          # Decode the base64 .pfx secret, import it into the runner's cert store, then write
          # a Windows-only config overlay carrying the thumbprint. Tauri auto-merges
          # src-tauri/tauri.windows.conf.json (RFC 7396) on Windows, so `tauri build` signs.
          # Secrets are read via $env:* (never interpolated into the command line) per
          # GitHub Actions injection guidance.
          [IO.File]::WriteAllBytes("$PWD/cert.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $pw = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $c = Import-PfxCertificate -FilePath cert.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pw
          Remove-Item cert.pfx
          $overlay = @{ bundle = @{ windows = @{ certificateThumbprint = $c.Thumbprint } } } | ConvertTo-Json -Depth 6
          Set-Content -Path apps/gui/src-tauri/tauri.windows.conf.json -Value $overlay -Encoding utf8
          Write-Host "Wrote signing overlay (thumbprint $($c.Thumbprint))."
      - id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing posture:
          # Windows Authenticode — ENABLED when the WINDOWS_CERTIFICATE/_PASSWORD secrets are
          #   set: the step above imports the .pfx and writes the thumbprint overlay that
          #   `tauri build` auto-merges (digestAlgorithm/timestampUrl live in tauri.conf.json).
          #   Generate a self-signed cert with scripts/gen-windows-cert.ps1; see
          #   apps/gui/WINDOWS-SIGNING.md.
          # Updater signing (NOT OS code signing) — deferred: TAURI_SIGNING_PRIVATE_KEY / _PASSWORD.
          # macOS Developer ID + notarization — deferred: APPLE_CERTIFICATE / _PASSWORD / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID.
        with:
          projectPath: apps/gui
          tagName: ${{ github.ref_name }}
          releaseName: Leshiy Desktop ${{ github.ref_name }}
          releaseBody: Desktop client bundles for ${{ github.ref_name }}.
          releaseDraft: true
          prerelease: false

      - name: Keep this release off GitHub's shared "latest" pointer
        # One matrix job is enough (all upload to the same release by tag); pin to the Linux
        # runner so the bash heredoc below isn't parsed by Windows PowerShell.
        if: matrix.platform == 'ubuntu-22.04' && steps.tauri.outputs.releaseId != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.tauri.outputs.releaseId }}
        run: |
          # tauri-action has no makeLatest input, so set it via the REST API. The "latest"
          # pointer must stay on the v* server/CLI train — the only one carrying
          # install.sh/install-client.sh/leshiyctl — or the README's releases/latest install
          # URLs would 404 once a desktop release is published. make_latest is a STRING here.
          curl -fsSL -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID" \
            -d '{"make_latest":"false"}'
