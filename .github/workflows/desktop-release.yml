name: desktop-release
on:
  push:
    tags: ["desktop-v*"]
permissions:
  contents: write
jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest
          - platform: macos-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libappindicator3-dev patchelf
      - name: Install JS deps
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing (deferred — set these secrets to enable):
          # Updater signing (NOT OS code signing): TAURI_SIGNING_PRIVATE_KEY / TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          # Windows Authenticode: a code-signing cert (bundle.windows.certificateThumbprint) — separate from the updater keys
          # macOS Developer ID + notarization: APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: Leshiy Desktop ${{ github.ref_name }}
          releaseBody: Desktop client bundles for ${{ github.ref_name }}.
          releaseDraft: true
          prerelease: false
