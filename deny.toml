# cargo-deny configuration — supply-chain & advisory gate (L7).
#
# Run locally with: cargo deny check advisories bans sources
# CI runs the same via .github/workflows/ci.yml (audit job).
#
# Note: `md-5` (used in leshiy-tls/src/ja.rs) is the canonical JA3 fingerprint
# hash mandated by the JA3 spec — DPI mimicry, NOT a security/integrity use.

[advisories]
# Fail the build on any RustSec advisory affecting the dependency tree. Watch
# the young QUIC/HTTP3 stack (quinn, h3, h3-quinn) and rusqlite in particular.
yanked = "deny"
# Reviewed exceptions. Each is an explicit, auditable risk-acceptance for an
# advisory with NO safe upgrade available — never a blanket disable, so a future
# unmaintained dep or a fixable vuln still trips the gate.
ignore = [
    # paste 1.0.15 (unmaintained) — deep transitive: net-route ->
    # netlink-packet-{core,route,utils}. Used only on the desktop route-table
    # path; unavoidable without dropping net-route, and the advisory has no
    # fixed version.
    "RUSTSEC-2024-0436",
    # rsa 0.10.0-rc.x — Marvin timing side-channel (RUSTSEC-2023-0071).
    # Transitive via russh/ssh-key for RSA SSH-key support; NO fixed version
    # exists upstream (RustCrypto/RSA#626). Risk accepted: leshiy uses `russh`
    # only as an SSH *client* during `leshiy remote provision`, performing at
    # most one RSA signing op with the operator's OWN private key on the
    # operator's OWN machine. The Marvin attack needs an attacker to time many
    # RSA private-key operations over the network (a server-side oracle), which
    # a one-shot client auth does not expose. Password / Ed25519 auth never
    # touches `rsa`. Revisit when RustCrypto/RSA ships a constant-time release.
    "RUSTSEC-2023-0071",
]

[bans]
# Pre-1.0 crates move fast; multiple versions are common in the tree and not a
# security issue by themselves. Wildcard version requirements are flagged (a guard
# against accidental `foo = "*"` on an external crate). The internal workspace
# path deps (`leshiy-* = { path = ... }`) surface as benign wildcard *warnings* —
# they don't fail the gate, and we keep version-less path deps so internal crate
# versions don't need lockstep bumps every release.
multiple-versions = "allow"
wildcards = "warn"

[sources]
# All dependencies must come from crates.io — no git/unknown sources (verified:
# the workspace has no git deps).
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
